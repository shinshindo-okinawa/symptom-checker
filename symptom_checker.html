/* ===== STATE ===== */
var currentStep = '__intro__';
var pendingDiseases = [];
var breadcrumb = [];

/* ===== ユーティリティ ===== */
function sb(){setTimeout(function(){window.scrollTo({top:0,behavior:'smooth'})},60)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function Tc(obj,key){return LANG==='en'?(obj[key+'_en']||obj[key+'_ja']):(obj[key+'_ja']||obj[key+'_en'])}

/* ===== TRAIL ===== */
function go(stepKey,diseases,label){
  breadcrumb.push(label);
  updateTrail();
  pendingDiseases=diseases||[];
  currentStep=stepKey;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function updateTrail(){
  var html='';
  breadcrumb.forEach(function(b,i){
    if(i>0) html+='<span class="trail-arr">&#x203A;</span>';
    html+='<span class="trail-item">'+esc(b)+'</span>';
  });
  document.getElementById('trail').innerHTML=html;
}

/* ===== RENDER ===== */
function render(){
  var mainEl=document.getElementById('main');
  var progEl=document.getElementById('prog');
  var progInfo=document.getElementById('prog-info');
  if(currentStep==='result'){showResult(pendingDiseases);return;}
  if(currentStep==='emergency_lumbar'){showEmergency(false);return;}
  if(currentStep==='emergency_head'){showEmergency(true);return;}
  if(currentStep==='__intro__'){showIntro();return;}
  var step=FLOW[currentStep];
  if(!step)return;
  progEl.style.width=step.p+'%';
  progInfo.textContent=(LANG==='en'?'Progress ':'進捗 ')+step.p+'%';
  var q=Tc(step,'q'), sub=Tc(step,'sub'), badge=Tc(step,'badge');
  var html='<div class="step-hdr">'
    +'<div class="step-badge">&#128269; '+badge+'</div>'
    +'<div class="step-q">'+q+'</div>'
    +(sub?'<div class="step-sub">'+sub+'</div>':'')
    +'</div>';
  if(step.grid){
    html+='<div class="grid2">';
    step.choices.forEach(function(c,i){
      html+='<button class="choice-sm" id="ch'+i+'">'
        +'<div class="choice-icon-box" style="background:'+c.ibg+'">'+c.icon+'</div>'
        +'<div class="choice-label">'+Tc(c,'label')+'</div>'
        +'</button>';
    });
    html+='</div>';
  }else{
    html+='<div class="choices">';
    step.choices.forEach(function(c,i){
      var desc=Tc(c,'desc');
      html+='<button class="choice" id="ch'+i+'">'
        +'<div class="choice-icon-box" style="background:'+c.ibg+'">'+c.icon+'</div>'
        +'<div><div class="choice-label">'+Tc(c,'label')+'</div>'
        +(desc?'<div class="choice-desc">'+desc+'</div>':'')
        +'</div></button>';
    });
    html+='</div>';
  }
  mainEl.innerHTML=html;
  step.choices.forEach(function(c,i){
    var btn=document.getElementById('ch'+i);
    if(btn) btn.addEventListener('click',(function(choice){return function(){go(choice.next,choice.diseases,Tc(choice,'label'));};})(c));
  });
}

/* ===== RESULT ===== */

    +'<a class="book-opt" href="https://lin.ee/o3YQEit" target="_blank"><span class="book-opt-ic">&#128172;</span><div>'
    +'<div class="book-opt-ttl">'+(LANG==='en'?'Chat on LINE':'LINEで相談・予約')+'</div>'
    +'<div class="book-opt-sub">@205tvrxn</div></div></a>'
    +'</div></div>';

  html+='<div class="clinic-info" style="margin-top:8px">'
    +'<div class="clinic-info-row"><span>&#127973;</span><span><strong>'+(LANG==='en'?CLINIC.name_en:CLINIC.name_ja)+'</strong></span></div>'
    +'<div class="clinic-info-row"><span>&#128205;</span><span>'+(LANG==='en'?CLINIC.address_en:CLINIC.address_ja)+'</span></div>'
    +'<div class="clinic-info-row"><span>&#128336;</span><span>'+(LANG==='en'?CLINIC.hours_en:CLINIC.hours_ja)+'</span></div>'
    +'<div class="clinic-info-row"><span>&#128697;</span><span>'+(LANG==='en'?CLINIC.parking_en:CLINIC.parking_ja)+'</span></div>'
    +'<div class="clinic-info-row"><span>&#9432;&#65039;</span><span>'+(LANG==='en'?'Free first consultation (approx. 30 min) · Insurance accepted':'初回カウンセリング無料（約30分）· 健康保険対応')+'</span></div>'
    +'</div>'
    +'<div style="font-size:10.5px;color:#aaa;text-align:center;margin-top:10px;line-height:1.6">'
    +(LANG==='en'?'* This tool provides reference information only. An accurate diagnosis will be made at your visit.':'※この診断は参考情報です。正確な診断は来院時に行います。')
    +'</div></div>';
  html+='<div class="restart-wrap"><button class="restart-btn" id="restart-btn2">&#128260; '+(LANG==='en'?'Start over (check another symptom)':'最初からやり直す（別の症状を確認する）')+'</button></div>';
  mainEl.innerHTML=html;

  var dcardsEl=document.getElementById('dcards');
  diseases.forEach(function(d,i){
    var bclass=d.urgency==='red'?'badge-red':d.urgency==='orange'?'badge-orange':'badge-green';
    var aclass=d.urgency==='red'?'red':d.urgency==='orange'?'orange':'green';
    var card=document.createElement('div');
    card.className='dcard';
    card.innerHTML='<div class="dcard-hdr" id="dh'+i+'">'
      +'<div class="dcard-icon" style="background:'+d.ibg+'">'+d.icon+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="dcard-name">'+Tc(d,'name')+'</div>'
      +'<div class="dcard-cat">'+Tc(d,'cat')+'</div></div>'
      +'<div class="badge '+bclass+'">'+Tc(d,'ulabel')+'</div></div>'
      +'<div class="dcard-body" id="db'+i+'">'
      +'<div class="abar '+aclass+'"><span style="font-size:15px;flex-shrink:0">'+d.uai+'</span>'
      +'<span class="abar-txt '+aclass+'">'+Tc(d,'umsg')+'</span></div>'
      +'<div class="dsec"><div class="dlbl">'+(LANG==='en'?'Overview':'疾患・病態の概要')+'</div>'
      +'<div class="dtxt">'+Tc(d,'summary')+'</div></div>'
      +'<div class="dsec"><div class="dlbl">'+(LANG==='en'?'Main symptoms':'主な症状')+'</div>'
      +'<div class="dtags">'+( (LANG==='en'?d.sx_en:d.sx_ja)||[] ).map(function(s){return'<span class="dtag">'+s+'</span>';}).join('')+'</div></div>'
      +'<div class="dsec"><div class="dlbl">'+(LANG==='en'?'Common causes':'主な原因')+'</div>'
      +'<div class="dtxt">'+Tc(d,'cause')+'</div></div>'
      +'<div class="dsec"><div class="dlbl">'+(LANG==='en'?'Our approach':'当院での施術・対応方針')+'</div>'
      +'<div class="dtxt">'+Tc(d,'tx')+'</div></div>'
      +'<div class="book-timing">'+Tc(d,'book_msg')+'</div></div>';
    card.querySelector('#dh'+i).addEventListener('click',function(){
      var body=document.getElementById('db'+i);
      var isOpen=body.classList.contains('open');
      dcardsEl.querySelectorAll('.dcard-body').forEach(function(b){b.classList.remove('open');});
      if(!isOpen){body.classList.add('open');body.scrollIntoView({behavior:'smooth',block:'nearest'});}
    });
    dcardsEl.appendChild(card);
  });
  document.getElementById('restart-btn2').addEventListener('click',init);
}

/* ===== EMERGENCY ===== */
function showEmergency(isHead){
  var mainEl=document.getElementById('main');
  document.getElementById('prog').style.width='100%';
  document.getElementById('prog-info').textContent='';
  var title=isHead
    ?(LANG==='en'?'Call emergency services now':'今すぐ救急へ連絡してください')
    :(LANG==='en'?'Seek emergency care immediately':'今すぐ救急・整形外科を受診してください');
  var msg=isHead
    ?(LANG==='en'?'A sudden, severe headache may indicate subarachnoid hemorrhage or another serious condition. Call 119 immediately.':'突然の激しい頭痛は、くも膜下出血など重篤な疾患の可能性があります。')
    :(LANG==='en'?'Bladder or bowel changes with back pain may indicate cauda equina syndrome. Seek emergency care immediately.':'排尿・排便の異常を伴う腰痛は、馬尾症候群が疑われます。神経の圧迫が進行する前に緊急受診が必要です。');
  mainEl.innerHTML='<div style="padding:20px">'
    +'<div class="emergency-box">'
    +'<div class="emergency-icon">&#128680;</div>'
    +'<div class="emergency-title">'+title+'</div>'
    +'<div class="emergency-msg">'+msg+'</div></div>'
    +'<div class="emergency-opt"><span class="emergency-opt-ic">&#128657;</span>'
    +'<div><div class="emergency-opt-ttl">'+(LANG==='en'?'Ambulance':'救急車')+'</div>'
    +'<div class="emergency-opt-sub">'+(LANG==='en'?'Call 119':'119番に電話する')+'</div></div></div>'
    +'<div class="emergency-opt"><span class="emergency-opt-ic">&#127973;</span>'
    +'<div><div class="emergency-opt-ttl">'+(LANG==='en'?'Emergency department / Orthopedic hospital':'救急外来・整形外科')+'</div>'
    +'<div class="emergency-opt-sub">'+(LANG==='en'?'Go to the nearest emergency hospital':'近隣の救急対応病院へ')+'</div></div></div>'
    +'</div>'
    +'<div class="restart-wrap"><button class="restart-btn" id="er-restart">&#128260; '+(LANG==='en'?'Start over':'最初からやり直す')+'</button></div>';
  document.getElementById('er-restart').addEventListener('click',init);
}
