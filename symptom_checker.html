/* ===== STATE ===== */
var currentStep = 'start';
var pendingDiseases = [];

/* ===== NAVIGATE ===== */
function go(stepKey, diseases, label) {
  breadcrumb.push(label);
  updateTrail();
  pendingDiseases = diseases || [];
  currentStep = stepKey;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateTrail() {
  var html = '';
  breadcrumb.forEach(function(b, i) {
    if(i > 0) html += '<span class="trail-arr">&#x203A;</span>';
    html += '<span class="trail-item">' + esc(b) + '</span>';
  });
  trailEl.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===== RENDER ===== */
function render() {
  if(currentStep === 'result') { showResult(pendingDiseases); return; }
  if(currentStep === 'emergency_lumbar') { showEmergency(false); return; }
  if(currentStep === 'emergency_head') { showEmergency(true); return; }

  var step = FLOW[currentStep];
  if(!step) return;

  progEl.style.width = step.p + '%';
  progInfo.textContent = '進捗 ' + step.p + '%';

  var html = '<div class="step-hdr">'
    + '<div class="step-badge">&#128269; ' + step.badge + '</div>'
    + '<div class="step-q">' + step.q + '</div>'
    + (step.sub ? '<div class="step-sub">' + step.sub + '</div>' : '')
    + '</div>';

  if(step.grid) {
    html += '<div class="grid2">';
    step.choices.forEach(function(c, i) {
      html += '<button class="choice-sm" id="ch' + i + '">'
        + '<div class="choice-icon-box" style="background:' + c.ibg + '">' + c.icon + '</div>'
        + '<div class="choice-label">' + c.label + '</div>'
        + '</button>';
    });
    html += '</div>';
  } else {
    html += '<div class="choices">';
    step.choices.forEach(function(c, i) {
      html += '<button class="choice" id="ch' + i + '">'
        + '<div class="choice-icon-box" style="background:' + c.ibg + '">' + c.icon + '</div>'
        + '<div><div class="choice-label">' + c.label + '</div>'
        + (c.desc ? '<div class="choice-desc">' + c.desc + '</div>' : '')
        + '</div></button>';
    });
    html += '</div>';
  }

  mainEl.innerHTML = html;

  /* attach click handlers by index — no inline onclick, no JSON in attributes */
  step.choices.forEach(function(c, i) {
    var btn = document.getElementById('ch' + i);
    if(btn) {
      btn.addEventListener('click', (function(choice) {
        return function() { go(choice.next, choice.diseases, choice.label); };
      })(c));
    }
  });
}

/* ===== RESULT ===== */
function showResult(dkeys) {
  progEl.style.width = '100%';
  progInfo.textContent = '';

  var diseases = dkeys.map(function(k){ return DISEASES[k] ? Object.assign({key:k},DISEASES[k]) : null; }).filter(Boolean);
  if(!diseases.length) { init(); return; }

  var rankMap = {red:3,orange:2,green:1};

  }
  html += '<div class="book-opt"><span class="book-opt-ic">&#127760;</span>'
    + '<div><div class="book-opt-title">ネット予約（24時間受付）</div>'
    + '<div class="book-opt-sub">空き状況をすぐ確認できます</div></div></div>'
    + '<div class="book-opt"><span class="book-opt-ic">&#128222;</span>'
    + '<div><div class="book-opt-title">お電話でのご予約・ご相談</div>'
    + '<div class="book-opt-sub">受付: 03-XXXX-XXXX（9:00〜19:00）</div></div></div>'
    + '<div style="font-size:11px;color:#aaa;text-align:center;margin-top:10px;line-height:1.6">&#8251;この診断は参考情報です。正確な診断は来院時に行います。</div>'
    + '</div>'
    + '<div class="restart-wrap"><button class="restart-btn" id="restart-btn2">&#128260; 最初からやり直す（別の症状を確認する）</button></div>';

  mainEl.innerHTML = html;

  /* build disease cards */
  var dcardsEl = document.getElementById('dcards');
  diseases.forEach(function(d, i) {
    var bclass = d.urgency==='red'?'badge-red':d.urgency==='orange'?'badge-orange':'badge-green';
    var aclass = d.urgency==='red'?'red':d.urgency==='orange'?'orange':'green';
    var card = document.createElement('div');
    card.className = 'dcard';
    card.innerHTML = '<div class="dcard-hdr" id="dh' + i + '">'
      + '<div class="dcard-icon" style="background:' + d.ibg + '">' + d.icon + '</div>'
      + '<div style="flex:1;min-width:0"><div class="dcard-name">' + d.name + '</div>'
      + '<div class="dcard-cat">' + d.cat + '</div></div>'
      + '<div class="badge ' + bclass + '">' + d.ulabel + '</div></div>'
      + '<div class="dcard-body" id="db' + i + '">'
      + '<div class="abar ' + aclass + '"><span style="font-size:15px;flex-shrink:0">' + d.uai + '</span>'
      + '<span class="abar-txt ' + aclass + '">' + d.umsg + '</span></div>'
      + '<div class="dsec"><div class="dlbl">疾患・病態の概要</div><div class="dtxt">' + d.summary + '</div></div>'
      + '<div class="dsec"><div class="dlbl">主な症状</div><div class="dtags">'
      + d.sx.map(function(s){ return '<span class="dtag">'+s+'</span>'; }).join('') + '</div></div>'
      + '<div class="dsec"><div class="dlbl">主な原因</div><div class="dtxt">' + d.cause + '</div></div>'
      + '<div class="dsec"><div class="dlbl">当院での施術・対応方針</div><div class="dtxt">' + d.tx + '</div></div>'
      + '<div class="book-timing">' + d.book_msg + '</div></div>';

    card.querySelector('#dh' + i).addEventListener('click', function() {
      var body = document.getElementById('db' + i);
      var isOpen = body.classList.contains('open');
      dcardsEl.querySelectorAll('.dcard-body').forEach(function(b){ b.classList.remove('open'); });
      if(!isOpen) {
        body.classList.add('open');
        body.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    });
    dcardsEl.appendChild(card);
  });

  document.getElementById('restart-btn2').addEventListener('click', init);
}

/* ===== EMERGENCY ===== */
function showEmergency(isHead) {
  progEl.style.width = '100%';
  progInfo.textContent = '';
  mainEl.innerHTML = '<div style="padding:20px">'
    + '<div class="emergency-box">'
    + '<div class="emergency-icon">&#128680;</div>'
    + '<div class="emergency-title">' + (isHead?'今すぐ救急へ連絡してください':'今すぐ救急・整形外科を受診してください') + '</div>'
    + '<div class="emergency-msg">' + (isHead
        ? '突然の激しい頭痛は、くも膜下出血など重篤な疾患の可能性があります。'
        : '排尿・排便の異常を伴う腰痛は、馬尾症候群が疑われます。神経の圧迫が進行する前に緊急受診が必要です。')
    + '</div></div>'
    + '<div class="emergency-opt"><span class="emergency-opt-ic">&#128657;</span>'
    + '<div><div class="emergency-opt-title">救急車</div><div class="emergency-opt-sub">119番に電話する</div></div></div>'
    + '<div class="emergency-opt"><span class="emergency-opt-ic">&#127973;</span>'
    + '<div><div class="emergency-opt-title">救急外来・整形外科</div><div class="emergency-opt-sub">近隣の救急対応病院へ</div></div></div>'
    + '</div>'
    + '<div class="restart-wrap"><button class="restart-btn" id="er-restart">&#128260; 最初からやり直す</button></div>';
  document.getElementById('er-restart').addEventListener('click', init);
}

/* ===== INTRO ===== */
function showIntro() {
  progEl.style.width = '0%';
  progInfo.textContent = '';
  trailEl.innerHTML = '';
  mainEl.innerHTML = '<div class="intro">'
    + '<div class="intro-icon">&#128269;</div>'
    + '<div class="intro-title">お困りの症状<br>絞り込み診断</div>'
    + '<div class="intro-desc">いくつかの質問に答えるだけで、考えられる疾患名・病態と受診の緊急度をお伝えします。</div>'
    + '<div class="intro-notes">'
    + '<div class="intro-note"><span>&#9989;</span><span>質問は最大3ステップで完了します</span></div>'
    + '<div class="intro-note"><span>&#9989;</span><span>疾患名・原因・施術方針をカードで確認できます</span></div>'
    + '<div class="intro-note"><span>&#9989;</span><span>受診の緊急度（今すぐ・1週間以内・余裕あり）をお伝えします</span></div>'
    + '<div class="intro-note"><span>&#9888;&#65039;</span><span>この診断は参考情報です。正確な診断は来院時に行います</span></div>'
    + '</div>'
    + '<button class="start-btn" id="start-btn">&#128269; 診断をはじめる</button>'
    + '</div>';
  document.getElementById('start-btn').addEventListener('click', function() {
    currentStep = 'start';
    pendingDiseases = [];
    render();
  });
}

function init() {
  breadcrumb = [];
  currentStep = 'start';
  pendingDiseases = [];
  showIntro();
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
